<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192x192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Akıllı ve Local-First Finans Platformu - Gelir gider takibi, portföy yönetimi ve finansal analiz" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Finans" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.json" />
    <title>Finans - Akıllı Yönetim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      /* Critical CSS - prevent flash of unstyled content */
      html {
        background-color: #0f172a;
      }
      body {
        background-color: #0f172a;
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        min-height: 100dvh;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }
      /* Safe area insets for mobile */
      .safe-area-bottom {
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      /* Hide content until styles are loaded */
      .preload {
        opacity: 0;
      }
      .loaded {
        opacity: 1;
        transition: opacity 0.2s ease-out;
      }
    </style>
    <script>
      // Prevent layout shift - show content after fonts load
      document.documentElement.classList.add('preload');
      document.fonts.ready.then(function() {
        document.documentElement.classList.remove('preload');
        document.documentElement.classList.add('loaded');
      });
      // Fallback timeout
      setTimeout(function() {
        document.documentElement.classList.remove('preload');
        document.documentElement.classList.add('loaded');
      }, 500);
    </script>

</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
